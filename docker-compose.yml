version: '3'

services:

  database:
    image: postgres:15.3
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}

  django-app:
    build:
      context: ./django_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - SQL_ENGINE=${SQL_ENGINE}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - CONTACT_EMAIL_ADDRESS=${CONTACT_EMAIL_ADDRESS}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
    volumes:
      - ./django_app:/usr/src/app
    depends_on:
      - database

  react-app:
    build:
      context: ./react_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL}

  ed50-shiny:
    container_name: shiny_cbass
    build:
      context: ./ed50-calculator/docker_components
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "3838:3838"
    environment:
      - R_LIBS_USER=/opt/conda/lib/R/library
    volumes:
      - ./ed50-calculator/docker_components/config:/config
      - ./ed50-calculator/examples:/home/data/Uploaded_xlsx
      - ./ed50-calculator/examples/outputs:/home/data/outputs
    depends_on:
      - database

  # ed50-calculator:
  #   build: ./ed50-calculator
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - ./ed50-calculator:/app
  #     - ed50_data:/tmp/ed50_uploads
  #     - ed50_results:/tmp/ed50_results

  # nginx:
  #   image: nginx:latest
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./django_app/staticfiles:/var/www/static
  #   ports:
  #     - "80:80"
